<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tra Tiếng Trung - Phát âm & Dịch</title>
    <script src="https://unpkg.com/pinyin-pro@3"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #ff6b6b;
        --secondary: #4f7cff;
        --accent: #ffd93d;
        --dark: #1a1a2e;
        --light: #f5f7fa;
        --success: #6bcf7f;
        --border: rgba(0, 0, 0, 0.12);
      }

      body {
        font-family: "Poppins", "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
        background-size: 55px 55px;
        animation: drift 18s linear infinite;
        pointer-events: none;
        z-index: 1;
      }

      @keyframes drift {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(60px, 60px);
        }
      }

      .container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 560px;
      }

      .header {
        text-align: center;
        color: white;
        margin-bottom: 28px;
        animation: slideDown 0.6s ease;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header h1 {
        font-size: 2.4rem;
        font-weight: 800;
        margin-bottom: 8px;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      }

      .header p {
        font-size: 1rem;
        opacity: 0.95;
      }

      .card {
        background: rgba(255, 255, 255, 0.96);
        border-radius: 28px;
        padding: 32px;
        box-shadow: 0 28px 70px rgba(9, 30, 66, 0.18);
        animation: slideUp 0.6s ease;
        border: 1px solid rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(10px);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .input-group {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 12px;
        margin-bottom: 16px;
      }

      input[type="text"] {
        width: 100%;
        padding: 16px 18px;
        border: 2px solid var(--border);
        border-radius: 16px;
        font-size: 1rem;
        font-family: inherit;
        transition: all 0.25s ease;
        background: var(--light);
        color: var(--dark);
      }

      input[type="text"]::placeholder {
        color: #6d7b98;
      }

      input[type="text"]:focus {
        outline: none;
        border-color: var(--secondary);
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(79, 124, 255, 0.12);
      }

      button {
        font-family: inherit;
      }

      .btn {
        padding: 14px 18px;
        border: none;
        border-radius: 14px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
        justify-content: center;
        min-height: 52px;
        touch-action: manipulation;
      }

      .btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        transform: none;
      }

      .btn-search {
        background: var(--secondary);
        color: white;
        min-width: 110px;
      }

      .btn-search:hover:not(:disabled) {
        background: #3a61d6;
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(79, 124, 255, 0.24);
      }

      .btn-mic {
        background: var(--primary);
        color: white;
        min-width: 54px;
        font-size: 1.1rem;
      }

      .btn-mic:hover {
        background: #ff5252;
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(255, 107, 107, 0.28);
      }

      .btn-mic.listening {
        animation: pulse 1.1s infinite;
        background: #ff3838;
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7);
        }
        50% {
          box-shadow: 0 0 0 10px rgba(255, 107, 107, 0);
        }
      }

      .status-bar {
        padding: 12px 16px;
        border-radius: 16px;
        background: rgba(79, 124, 255, 0.14);
        color: white;
        margin-bottom: 18px;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .status-bar[data-type="error"] {
        background: rgba(255, 107, 107, 0.18);
        color: white;
      }

      .status-bar[data-type="success"] {
        background: rgba(107, 207, 127, 0.16);
        color: white;
      }

      .result-container {
        opacity: 0;
        max-height: 0;
        overflow: hidden;
        transition: opacity 0.35s ease, max-height 0.35s ease;
      }

      .result-container.show {
        opacity: 1;
        max-height: 2200px;
      }

      .result-box {
        background: linear-gradient(135deg, #f7f9ff 0%, #ffffff 100%);
        border: 1px solid rgba(79, 124, 255, 0.14);
        border-radius: 22px;
        padding: 24px;
        border-left: 6px solid var(--secondary);
      }

      .result-box h3 {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
        color: var(--secondary);
      }

      .result-box p {
        color: var(--dark);
        font-size: 1.35rem;
        font-weight: 700;
        margin: 6px 0 12px;
      }

      .hanzi-section {
        margin: 20px 0;
        padding: 20px;
        background: #f4f7ff;
        border-radius: 20px;
        border: 1px solid rgba(79, 124, 255, 0.08);
      }

      .hanzi-label {
        font-size: 0.85rem;
        color: var(--secondary);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 14px;
        font-weight: 700;
      }

      #hanzi-writer {
        width: 100%;
        min-height: 240px;
        max-height: 320px;
        border: 2px solid #e6ecff;
        border-radius: 18px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 14px;
        padding: 18px;
      }

      #hanzi-writer img {
        max-width: 100%;
        max-height: 280px;
        object-fit: contain;
      }

      .hanzi-controls {
        margin-top: 8px;
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .hanzi-ctrl-btn {
        padding: 10px 16px;
        font-size: 0.9rem;
        background: rgba(79, 124, 255, 0.14);
        color: var(--dark);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
      }

      .hanzi-ctrl-btn:hover {
        background: rgba(79, 124, 255, 0.22);
        transform: translateY(-1px);
      }

      .result-box .pinyin {
        color: var(--secondary);
        font-size: 1rem;
        font-style: italic;
        margin-bottom: 10px;
      }

      .result-box .meaning {
        color: #515e80;
        font-size: 1rem;
        line-height: 1.7;
        margin-bottom: 14px;
      }

      .btn-action {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .btn-speak,
      .btn-speak-vi,
      .btn-copy {
        color: white;
        padding: 12px 14px;
        font-size: 0.95rem;
        border-radius: 14px;
        border: none;
        cursor: pointer;
      }

      .btn-speak {
        background: var(--success);
      }

      .btn-speak:hover {
        background: #5ab866;
      }

      .btn-speak-vi {
        background: #ff9800;
      }

      .btn-speak-vi:hover {
        background: #f57c00;
      }

      .btn-copy {
        background: var(--accent);
        color: var(--dark);
        grid-column: 1 / -1;
        justify-self: stretch;
      }

      .btn-copy:hover {
        background: #ffc800;
      }

      .error {
        background: rgba(255, 235, 238, 0.92);
        border-left-color: var(--primary);
        color: #c62828;
      }

      .mic-indicator {
        position: fixed;
        bottom: 18px;
        left: 18px;
        background: rgba(255, 255, 255, 0.98);
        padding: 12px 16px;
        border-radius: 999px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.14);
        display: none;
        align-items: center;
        gap: 10px;
        font-size: 0.92rem;
        color: var(--dark);
        z-index: 100;
      }

      .mic-indicator.active {
        display: flex;
      }

      .mic-dot {
        width: 9px;
        height: 9px;
        background: var(--primary);
        border-radius: 50%;
        animation: blink 0.9s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }

      @media (max-width: 720px) {
        .container {
          max-width: 100%;
        }

        .card {
          padding: 24px;
        }

        .input-group {
          grid-template-columns: 1fr;
        }

        .btn-search,
        .btn-mic {
          width: 100%;
        }

        .btn-action {
          grid-template-columns: 1fr;
        }

        .result-box p {
          font-size: 1.15rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>🌍 Tra Tiếng Trung</h1>
        <p>Dịch - Phát âm - Nhận dạng giọng nói</p>
      </div>

      <div class="card">
        <div class="input-group">
          <input
            type="text"
            id="input"
            placeholder="Nhập tiếng Trung hoặc nói vào mic..."
          />
          <button type="button" class="btn btn-mic" id="micBtn" title="Bấm nút để nói">
            🎤
          </button>
          <button type="button" class="btn btn-search" id="searchBtn">Tra cứu</button>
        </div>

        <div class="status-bar" id="statusBar" data-type="info">Nhấn Tra cứu hoặc mic để bắt đầu.</div>
        <div id="result" class="result-container"></div>
      </div>
    </div>

    <div class="mic-indicator" id="micIndicator">
      <div class="mic-dot"></div>
      <span id="micText">Đang nghe...</span>
    </div>

    <script>
      const inputEl = document.getElementById("input");
      const micBtn = document.getElementById("micBtn");
      const searchBtn = document.getElementById("searchBtn");
      const resultDiv = document.getElementById("result");
      const statusBar = document.getElementById("statusBar");
      const micIndicator = document.getElementById("micIndicator");
      const micText = document.getElementById("micText");

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition || window.mozSpeechRecognition || window.msSpeechRecognition;
      const supportsSpeechRecognition = !!SpeechRecognition;
      const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      let recognition = null;
      let isListening = false;
      let currentWord = "";
      let currentCharIndex = 0;

      if (window.speechSynthesis) {
        window.speechSynthesis.onvoiceschanged = () => {
          window.speechSynthesis.getVoices();
        };
      }

      function setStatus(message, type = "info") {
        statusBar.textContent = message;
        statusBar.dataset.type = type;
      }

      function setBusy(isBusy) {
        searchBtn.disabled = isBusy;
        searchBtn.textContent = isBusy ? "Đang xử lý..." : "Tra cứu";
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function initRecognition() {
        if (!SpeechRecognition) {
          return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = "zh-CN";
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
          isListening = true;
          micBtn.classList.add("listening");
          micIndicator.classList.add("active");
          setStatus("Đang nghe... hãy nói tiếng Trung rõ ràng.");
        };

        recognition.onresult = (event) => {
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              inputEl.value = transcript.trim();
            }
          }
          micText.textContent = "Đang nghe...";
        };

        recognition.onend = () => {
          isListening = false;
          recognition = null;
          micBtn.classList.remove("listening");
          micIndicator.classList.remove("active");
          micText.textContent = "Đang nghe...";
          setStatus("Nhấn mic để ghi âm lại hoặc Tra cứu kết quả.");
        };

        recognition.onerror = (event) => {
          isListening = false;
          recognition = null;
          micBtn.classList.remove("listening");
          micIndicator.classList.remove("active");
          const message = event.error === "no-speech"
            ? "Không nghe thấy giọng nói, vui lòng thử lại."
            : event.error === "not-allowed" || event.error === "service-not-allowed"
            ? "Không được phép truy cập micro. Kiểm tra cài đặt trình duyệt."
            : event.error === "audio-capture"
            ? "Không thể truy cập micro. Vui lòng kiểm tra quyền micro."
            : `Lỗi mic: ${event.error}`;
          setStatus(message, "error");
        };
      }

      function toggleListening() {
        if (!supportsSpeechRecognition) {
          const fallbackMessage = isiOS
            ? "iOS Safari không hỗ trợ mic Web Speech API. Vui lòng dùng Chrome trên Android hoặc máy tính."
            : "Hiện tại trình duyệt không hỗ trợ mic. Dùng Chrome/Edge trên Android hoặc Chrome/desktop.";
          setStatus(fallbackMessage, "error");
          return;
        }

        if (isListening && recognition) {
          recognition.stop();
          return;
        }

        if (!recognition) {
          initRecognition();
        }

        if (!recognition) {
          setStatus("Không thể tạo phiên mic. Vui lòng thử lại sau.", "error");
          return;
        }

        try {
          if (recognition && !isListening && recognition.abort) {
            recognition.abort();
          }
          recognition.start();
        } catch (error) {
          setStatus("Không thể bắt đầu mic. Vui lòng cho phép quyền micro và thử lại.", "error");
          console.error(error);
          recognition = null;
        }
      }

      function updateResultContent(word, meaning, pinyinText) {
        const safeWord = escapeHtml(word);
        const safeMeaning = escapeHtml(meaning);
        const safePinyin = escapeHtml(pinyinText);

        resultDiv.classList.add("show");
        resultDiv.innerHTML = `
          <div class="result-box">
            <h3>Từ Trung</h3>
            <p>${safeWord}</p>
            <div class="pinyin">📝 Phiên âm: ${safePinyin}</div>
            <div class="meaning">📖 Nghĩa: ${safeMeaning}</div>

            <div class="hanzi-section">
              <div class="hanzi-label">✏️ Cách viết chữ (từng nét)</div>
              <div id="hanzi-writer"></div>
              <div class="hanzi-controls">
                <button type="button" class="hanzi-ctrl-btn" data-action="reset-hanzi">↻ Làm lại</button>
                <button type="button" class="hanzi-ctrl-btn" data-action="play-hanzi">▶ Xem lại</button>
                <button type="button" class="hanzi-ctrl-btn" data-action="next-hanzi">→ Chữ tiếp theo</button>
              </div>
            </div>

            <div class="btn-action">
              <button type="button" class="btn btn-speak" data-action="speak-chinese" data-text="${safeWord}">🔊 Trung</button>
              <button type="button" class="btn btn-speak-vi" data-action="speak-vietnamese" data-text="${safeMeaning}">🔊 Việt</button>
            </div>
            <div class="btn-action">
              <button type="button" class="btn btn-copy" data-action="copy-text" data-text="${safeWord}">📋 Copy Trung</button>
            </div>
          </div>
        `;
      }

      async function searchWord() {
        const word = inputEl.value.trim();
        if (!word) {
          setStatus("Vui lòng nhập hoặc nói tiếng Trung cần tra cứu.", "error");
          return;
        }

        setBusy(true);
        setStatus("Đang tra cứu...", "info");
        resultDiv.classList.remove("show");

        try {
          const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=zh-CN|vi`);
          if (!res.ok) {
            throw new Error("Mạng không ổn định");
          }

          const data = await res.json();
          const meaning = data.responseData.translatedText || "Không tìm thấy";
          const pinyinText = pinyinPro.pinyin(word, { toneType: "symbol" });

          updateResultContent(word, meaning, pinyinText);
          setStatus("Kết quả đã sẵn sàng.", "success");
          scrollToResult();
          if (word) {
            loadHanziStroke(word);
          }
        } catch (error) {
          setStatus("Lỗi tra cứu. Kiểm tra kết nối mạng.", "error");
          resultDiv.classList.add("show");
          resultDiv.innerHTML = `<div class="result-box error">❌ ${escapeHtml(error.message || "Đã có lỗi xảy ra")}</div>`;
        } finally {
          setBusy(false);
        }
      }

      function scrollToResult() {
        if (resultDiv.classList.contains("show")) {
          resultDiv.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }

      function resolveVoice(langPrefix) {
        if (!window.speechSynthesis) return null;
        const voices = window.speechSynthesis.getVoices();
        if (!voices || !voices.length) return null;
        return (
          voices.find((voice) => voice.lang.toLowerCase().startsWith(langPrefix.toLowerCase())) ||
          voices.find((voice) => voice.lang.toLowerCase().includes(langPrefix.toLowerCase())) ||
          voices[0]
        );
      }

      function speakWithSynthesis(text, lang) {
        if (!window.speechSynthesis) return false;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = 0.95;
        utterance.pitch = 1;
        utterance.volume = 1;

        const voice = resolveVoice(lang);
        if (voice) {
          utterance.voice = voice;
        }

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
        return true;
      }

      function speakViaAudio(text, langCode) {
        const safeText = encodeURIComponent(text);
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${safeText}&tl=${langCode}&client=tw-ob`;
        const audio = new Audio();
        audio.playsInline = true;
        audio.crossOrigin = "anonymous";
        audio.src = url;
        audio.load();
        audio.play().catch((err) => {
          console.warn("Audio fallback failed", err);
          setStatus("Không thể phát âm. Vui lòng cho phép âm thanh hoặc thử lại.", "error");
        });
      }

      function speakChinese(text) {
        if (!text) return;
        if (!speakWithSynthesis(text, "zh-CN")) {
          speakViaAudio(text, "zh-CN");
        }
      }

      function speakVietnamese(text) {
        if (!text) return;
        if (!speakWithSynthesis(text, "vi-VN")) {
          speakViaAudio(text, "vi");
        }
      }

      function loadHanziStroke(word) {
        const container = document.getElementById("hanzi-writer");
        if (!container) return;

        currentWord = word;
        currentCharIndex = 0;

        const firstChar = word.charAt(0);
        const hex = firstChar.charCodeAt(0).toString(16).toUpperCase().padStart(4, "0");
        const urls = [
          `https://commons.wikimedia.org/wiki/Special:FilePath/Stroke_order_${hex}.gif`,
          `https://commons.wikimedia.org/wiki/Special:FilePath/Stroke_order_${hex}.png`,
        ];

        container.innerHTML = `<div class="hanzi-placeholder">${escapeHtml(firstChar)}</div>`;

        const img = document.createElement("img");
        img.alt = `Cách viết chữ ${firstChar}`;
        img.style.maxWidth = "100%";
        img.style.maxHeight = "280px";
        img.style.objectFit = "contain";

        img.onload = () => {
          container.innerHTML = "";
          container.appendChild(img);
        };

        img.onerror = () => {
          img.src = urls[1];
          img.onerror = () => {
            container.innerHTML = `<div class="hanzi-placeholder">${escapeHtml(firstChar)}</div>`;
          };
        };

        img.src = urls[0];
      }

      function resetHanzi() {
        const word = inputEl.value.trim();
        if (word) {
          loadHanziStroke(word);
        }
      }

      function playHanziAnimation() {
        resetHanzi();
      }

      function nextHanzi() {
        if (currentWord && currentCharIndex < currentWord.length - 1) {
          currentCharIndex++;
          const char = currentWord[currentCharIndex];
          loadHanziStroke(char);
        } else {
          setStatus("Đã đến chữ cuối cùng.", "error");
        }
      }

      function copyToClipboard(text) {
        if (!text) return;
        navigator.clipboard
          .writeText(text)
          .then(() => setStatus("Đã copy vào clipboard.", "success"))
          .catch(() => setStatus("Không thể copy. Vui lòng thử lại.", "error"));
      }

      resultDiv.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const action = button.dataset.action;
        const text = button.dataset.text || "";

        if (action === "speak-chinese") {
          speakChinese(text);
        } else if (action === "speak-vietnamese") {
          speakVietnamese(text);
        } else if (action === "copy-text") {
          copyToClipboard(text);
        } else if (action === "reset-hanzi") {
          resetHanzi();
        } else if (action === "play-hanzi") {
          playHanziAnimation();
        } else if (action === "next-hanzi") {
          nextHanzi();
        }
      });

      if (supportsSpeechRecognition) {
        initRecognition();
      } else {
        setStatus("Mic không hỗ trợ trên trình duyệt này.", "error");
        micBtn.style.opacity = "0.65";
        micBtn.disabled = true;
      }

      micBtn.addEventListener("click", toggleListening);
      searchBtn.addEventListener("click", searchWord);

      inputEl.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          searchWord();
        }
      });
    </script>
  </body>
</html>

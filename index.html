<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese-Vietnamese Translation App</title>
    <style>
        body {
            background-color: white;
            color: black;
            transition: background-color 0.5s, color 0.5s;
        }
        body.dark-mode {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <button id="toggleDarkMode">Toggle Dark Mode</button>
    <h1>Chinese-Vietnamese Translation App</h1>
    <input type="text" id="searchBox" placeholder="Search..."></input>
    <button id="searchBtn">Search</button>
    <div id="history"></div>
    <div id="favorites"></div>
    <script>
        const toggleDarkModeButton = document.getElementById('toggleDarkMode');
        const searchBox = document.getElementById('searchBox');
        const searchHistoryDiv = document.getElementById('history');
        const favoritesDiv = document.getElementById('favorites');
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        toggleDarkModeButton.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        function updateHistory() {
            const history = JSON.parse(localStorage.getItem('searchHistory')) || [];
            searchHistoryDiv.innerHTML = '<h2>Search History:</h2>' + history.map(item => `<div>${item}</div>`).join('');
        }

        searchBox.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        function performSearch() {
            const query = searchBox.value;
            if (!query) return;
            // Perform the search and store in search history
            let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
            if (!history.includes(query)) {
                history.push(query);
                localStorage.setItem('searchHistory', JSON.stringify(history));
                updateHistory();
            }
            searchBox.value = '';
            // Implement search logic here...
        }

        function addToFavorites(item) {
            if (!favorites.includes(item)) {
                favorites.push(item);
                localStorage.setItem('favorites', JSON.stringify(favorites));
                updateFavorites();
            }
        }

        function updateFavorites() {
            favoritesDiv.innerHTML = '<h2>Favorites:</h2>' + favorites.map(item => `<div>${item}</div>`).join('');
        }

        window.addEventListener('load', () => {
            updateHistory();
            updateFavorites();
        });
    </script>
</body>
</html>
